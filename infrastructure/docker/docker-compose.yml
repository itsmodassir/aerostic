version: '3.8'

services:

  postgres:
    image: postgres:15-alpine
    container_name: aimstors-postgres
    restart: always
    environment:
      POSTGRES_USER: aimstors
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: aimstors
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    deploy:
      resources:
        limits:
          memory: 512m

  nginx:
    image: nginx:alpine
    container_name: aimstors-nginx
    restart: always
    network_mode: host
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Static Assets Mounts (DELETED landing mount - migrated to Next.js)
      # Stable parent mount to prevent stale inodes after builds
      - /var/www/aimstors/frontend/app-dashboard:/usr/share/nginx/html/app:ro
      - /var/www/aimstors/frontend/admin-panel:/usr/share/nginx/html/admin:ro

  redis:
    image: redis:7-alpine
    container_name: aimstors-redis
    restart: always
    command: redis-server --maxmemory 1gb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"


  pinchtab:
    image: pinchtab/pinchtab:latest
    container_name: aimstors-pinchtab
    restart: always
    ports:
      - "127.0.0.1:9867:9867"
    environment:
      - PORT=9867
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9867/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
