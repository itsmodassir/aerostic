events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_vary on;

    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 80;
        server_name poddar-harmony.in;

        location /socket.io/ {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_pass http://127.0.0.1:3001/socket.io/;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:3001;
        }

        location /webhook/ {
            proxy_pass http://127.0.0.1:3003/;
        }

        location /_next/static/ {
            alias /usr/share/nginx/html/app/static_runtime/;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Content-Type-Options nosniff;
        }

        location /public/ {
            alias /usr/share/nginx/html/app/public/;
            add_header Cache-Control "public, max-age=86400";
            try_files $uri =404;
        }

        location = /logo.png {
            alias /usr/share/nginx/html/app/public/logo.png;
        }

        location = /manifest.json {
            alias /usr/share/nginx/html/app/public/manifest.json;
        }

        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        }
    }

    server {
        listen 80;
        server_name admin.whatsapp.aimstore.in;

        location /socket.io/ {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_pass http://127.0.0.1:3001/socket.io/;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:3001;
        }

        location /_next/static/ {
            alias /usr/share/nginx/html/admin/static_runtime/;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Content-Type-Options nosniff;
        }

        location /public/ {
            alias /usr/share/nginx/html/admin/public/;
            add_header Cache-Control "public, max-age=86400";
            try_files $uri =404;
        }

        location / {
            proxy_pass http://127.0.0.1:3002;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        }
    }

    server {
        listen 80;
        server_name reseller.whatsapp.aimstore.in;

        location /socket.io/ {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_pass http://127.0.0.1:3001/socket.io/;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:3001;
        }

        location /_next/static/ {
            alias /usr/share/nginx/html/reseller/static_runtime/;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Content-Type-Options nosniff;
        }

        location /public/ {
            alias /usr/share/nginx/html/reseller/public/;
            add_header Cache-Control "public, max-age=86400";
            try_files $uri =404;
        }

        location / {
            proxy_pass http://127.0.0.1:3004;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        }
    }

    server {
        listen 80;
        server_name api.whatsapp.aimstore.in;

        location / {
            proxy_pass http://127.0.0.1:3001;
        }
    }

    server {
        listen 80;
        server_name webhook.whatsapp.aimstore.in;

        location / {
            proxy_pass http://127.0.0.1:3003;
        }
    }

    server {
        listen 80;
        server_name whatsapp.aimstore.in;
        return 301 http://poddar-harmony.in$request_uri;
    }

}
